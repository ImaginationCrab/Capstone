<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTS Code Lookup</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --accent: #2c5282;
    --accent-light: #ebf2fa;
    --border: #e2e0dc;
    --code-bg: #f0eeea;
    --radius: 8px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 1rem;
  }

  .container {
    max-width: 820px;
    margin: 0 auto;
    padding: 3rem 0;
  }

  header {
    margin-bottom: 2rem;
  }

  header h1 {
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  header p {
    color: var(--text-muted);
    margin-top: 0.3rem;
    font-size: 0.95rem;
  }

  /* ── Search bar ─────────────────────────────── */

  .search-wrap {
    position: relative;
    margin-bottom: 1.5rem;
  }

  .search-wrap input {
    width: 100%;
    padding: 0.85rem 1rem 0.85rem 2.8rem;
    font-family: inherit;
    font-size: 1rem;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    outline: none;
    transition: border-color 0.15s;
  }

  .search-wrap input:focus {
    border-color: var(--accent);
  }

  .search-wrap .icon {
    position: absolute;
    left: 0.9rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
  }

  .hint {
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-bottom: 1.5rem;
  }

  /* ── Results ────────────────────────────────── */

  .status {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-bottom: 0.75rem;
  }

  .result {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.15rem;
    margin-bottom: 0.6rem;
    transition: border-color 0.15s;
  }

  .result:hover {
    border-color: var(--accent);
  }

  .result-header {
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
    margin-bottom: 0.4rem;
    flex-wrap: wrap;
  }

  .hts-code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.92rem;
    font-weight: 500;
    color: var(--accent);
    background: var(--accent-light);
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    white-space: nowrap;
  }

  .description {
    font-size: 0.93rem;
    line-height: 1.45;
  }

  .duty-row {
    display: flex;
    gap: 1.2rem;
    margin-top: 0.55rem;
    flex-wrap: wrap;
  }

  .duty-tag {
    font-size: 0.78rem;
    color: var(--text-muted);
  }

  .duty-tag strong {
    font-weight: 500;
    color: var(--text);
  }

  .empty {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-muted);
  }

  .empty .big {
    font-size: 1.3rem;
    margin-bottom: 0.3rem;
    font-weight: 500;
    color: var(--text);
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>HTS Code Lookup</h1>
    <p>Search the Harmonized Tariff Schedule of the United States</p>
  </header>

  <div class="search-wrap">
    <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="search" placeholder="Search items, e.g. &quot;frozen shrimp&quot; or &quot;cotton t-shirt&quot;" autofocus>
  </div>

  <p class="hint">Type a description or paste an HTS code. Results update as you type.</p>

  <div id="results"></div>
</div>

<script>
  const input = document.getElementById('search');
  const resultsEl = document.getElementById('results');
  let debounceTimer;

  input.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(doSearch, 250);
  });

  async function doSearch() {
    const q = input.value.trim();

    if (!q) {
      resultsEl.innerHTML = '';
      return;
    }

    // If it looks like an HTS code (digits + dots), use the lookup endpoint
    const isCode = /^[\d.]+$/.test(q);
    const url = isCode
      ? `/api/lookup/${encodeURIComponent(q)}`
      : `/api/search?q=${encodeURIComponent(q)}`;

    try {
      const resp = await fetch(url);
      if (!resp.ok) {
        resultsEl.innerHTML = `<div class="empty"><div class="big">No results</div><p>Try a different search term.</p></div>`;
        return;
      }
      const data = await resp.json();
      render(data);
    } catch (err) {
      resultsEl.innerHTML = `<div class="empty"><div class="big">Error</div><p>${err.message}</p></div>`;
    }
  }

  function render(data) {
    if (!data.results || data.results.length === 0) {
      resultsEl.innerHTML = `<div class="empty"><div class="big">No results</div><p>Try a different search term.</p></div>`;
      return;
    }

    const status = `<div class="status">${data.count} result${data.count !== 1 ? 's' : ''}</div>`;

    const cards = data.results.map(r => {
      const code = r.hts_code
        ? `<span class="hts-code">${esc(r.hts_code)}</span>`
        : '';

      const duties = [];
      if (r.general) duties.push(`<span class="duty-tag">General: <strong>${esc(r.general)}</strong></span>`);
      if (r.special) duties.push(`<span class="duty-tag">Special: <strong>${esc(r.special)}</strong></span>`);
      if (r.unit)    duties.push(`<span class="duty-tag">Unit: <strong>${esc(r.unit)}</strong></span>`);

      return `
        <div class="result">
          <div class="result-header">${code}</div>
          <div class="description">${esc(r.description)}</div>
          ${duties.length ? `<div class="duty-row">${duties.join('')}</div>` : ''}
        </div>`;
    }).join('');

    resultsEl.innerHTML = status + cards;
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }
</script>

</body>
</html>
